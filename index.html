<script>
// ╔══════════════════════════════════════════════════════════╗
// ║  ⚙️  SUPABASE KONFIGURATION – HIER EINTRAGEN!           ║
// ║  Ersetze beide Werte mit deinen eigenen.                ║
// ║  Anleitung: siehe supabase_anleitung.md                 ║
// ╚══════════════════════════════════════════════════════════╝
const SUPABASE_URL  = "https://hlwdrvqsiynnazibrqqm.supabase.co";
const SUPABASE_KEY  = "sb_publishable_VJXFOHKCG0Z9awuPQbq7XA_4emCXs2F";

let sb = null;
try {
  sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
} catch(e) {
  console.warn('Supabase nicht konfiguriert:', e.message);
}

// ══════════════════════════════════════════════════════════
//  📚  FRAGENKATALOG – 335 Fragen
// ══════════════════════════════════════════════════════════
// Fragen werden aus questions.js geladen (muss im selben Ordner liegen)
const QS = (typeof QUESTIONS !== "undefined" ? QUESTIONS : []).map(q => ({
  ...q,
  q: q.q ?? q.question,
  o: q.o ?? q.options,
  c: q.c ?? q.correctIndex,
  e: q.e ?? q.explanation,
  t: q.t ?? q.topic,
  author: q.author ?? null
}));


const QUESTIONS_PER_ROUND = 10;

// ══════════════════════════════════════════════════════════
//  🛠️  UTILS
// ══════════════════════════════════════════════════════════
const shuffle = arr => {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
};
// Shuffelt Antwortoptionen und passt den Index der richtigen Antwort an
const shuffleOptions = q => {
  const idx = [0,1,2,3];
  const s = shuffle(idx);
  return { ...q, o: s.map(i => q.o[i]), c: s.indexOf(q.c) };
};
const getTopics = () => { const s = new Set(); QS.forEach(q => q.t?.forEach(t => s.add(t))); return [...s].sort((a,b)=>a.localeCompare(b,'de')); };
const getByTopic = t => QS.filter(q => q.t?.includes(t));
const genCode = () => { const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; return Array.from({length:4},()=>c[Math.floor(Math.random()*c.length)]).join(''); };
const genId = () => `p_${Date.now()}_${Math.random().toString(36).slice(2,7)}`;
const LETTERS = ['A','B','C','D'];
const topics = getTopics();

// ══════════════════════════════════════════════════════════
//  🔒  TOPIC UNLOCK SYSTEM
// ══════════════════════════════════════════════════════════
const UNLOCK_THRESHOLD = 10;
const ALWAYS_UNLOCKED = ['Aminosäuren und Proteine', 'Techniken', 'Klinik'];
const TOPIC_ORDER = [
  'Aminosäuren und Proteine','Enzyme','Kohlenhydrate','Lipide',
  'Bioenergetik','Kompartimente','Nukleinsäuren','Hormone','Blut',
  'Techniken','Klinik'
];

let topicProgress = {};
let isAdmin = false;

// Admin per URL-Parameter: index.html?admin=DEIN_CODE
// Code wird serverseitig geprüft – steht NICHT im Quelltext!
const _urlP = new URLSearchParams(window.location.search);
const _adminInput = _urlP.get('admin') || '';
if (_adminInput && sb) {
  sb.rpc('verify_admin', { code: _adminInput }).then(function(res) {
    if (res.data === true) { isAdmin = true; render(); }
  });
}

function isTopicUnlocked(t) {
  if (isAdmin) return true;
  return topicProgress[t]?.unlocked ?? ALWAYS_UNLOCKED.includes(t);
}

function initTopicProgress() {
  TOPIC_ORDER.forEach(function(t) {
    topicProgress[t] = { count: 0, unlocked: ALWAYS_UNLOCKED.includes(t) };
  });
}

async function loadTopicProgress() {
  initTopicProgress();
  if (!sb) return;
  try {
    var res = await sb.from('bb_progress').select('*');
    if (res.data && res.data.length > 0) {
      res.data.forEach(function(row) {
        topicProgress[row.topic] = { count: row.count || 0, unlocked: row.unlocked || ALWAYS_UNLOCKED.includes(row.topic) };
      });
    }
  } catch(e) { console.log('Progress laden fehlgeschlagen, nutze Defaults.'); }
}

// ══════════════════════════════════════════════════════════
//  📊  ANONYME NUTZUNGSSTATISTIK (datenschutzkonform)
// ══════════════════════════════════════════════════════════
function trackEvent(eventType, topic) {
  try {
    fetch(SUPABASE_URL + '/rest/v1/rpc/track_event', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY
      },
      body: JSON.stringify({ p_event_type: eventType, p_topic: topic || null })
    });
  } catch(e) {}
}

// ══════════════════════════════════════════════════════════
//  ⚙️  ADMIN-FUNKTIONEN (serverseitig abgesichert)
// ══════════════════════════════════════════════════════════
// Direkter REST-Aufruf an Supabase (umgeht Tracking Prevention)
function adminRpc(fnName, params) {
  fetch(SUPABASE_URL + '/rest/v1/rpc/' + fnName, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY
    },
    body: JSON.stringify(params)
  });
}

window.adminChangeCount = function(topic, delta) {
  if (!isAdmin) return;
  var p = topicProgress[topic];
  var newCount = Math.max(0, (p.count || 0) + delta);
  var newUnlocked = newCount >= UNLOCK_THRESHOLD ? true : p.unlocked;
  adminRpc('admin_update_progress', {
    admin_code: _adminInput, topic_name: topic,
    new_count: newCount, is_unlocked: newUnlocked
  });
  p.count = newCount;
  p.unlocked = newUnlocked;
  render();
};

window.adminToggleLock = function(topic) {
  if (!isAdmin) return;
  var p = topicProgress[topic];
  var newUnlocked = !p.unlocked;
  adminRpc('admin_update_progress', {
    admin_code: _adminInput, topic_name: topic,
    new_count: p.count || 0, is_unlocked: newUnlocked
  });
  p.unlocked = newUnlocked;
  render();
};

const S = {
  screen: 'home', playerId: genId(), playerName: '',
  topic: null, quizQs: [], qIdx: 0, score: 0, answered: null,
  isHost: false, roomCode: '', room: null,
  multiScore: 0, multiQIdx: 0, multiAnswered: null

// ══════════════════════════════════════════════════════════
//  🟢  SUPABASE – DATENBANK
// ══════════════════════════════════════════════════════════
async function saveRoom(room) {
  if (!sb) return;
  await sb.from('bb_rooms').upsert({ code: room.code, data: room, updated_at: new Date().toISOString() });
}

async function loadRoom(code) {
  if (!sb) return null;
  const { data, error } = await sb.from('bb_rooms').select('data').eq('code', code.toUpperCase()).single();
  if (error || !data) return null;
  return data.data;
}

// ══════════════════════════════════════════════════════════
//  🛡️  ROBUSTER SYNC MANAGER (Production-Level)
// ══════════════════════════════════════════════════════════
const Sync = {
  channel: null,
  pollingInterval: null,
  pollingDelay: 2500,
  isConnected: false,
  resultShown: false   // idempotenz-Schutz
};

// Raum verlassen (echter Abbruch)
function detachListener() {
  if (Sync.channel) { sb?.removeChannel(Sync.channel); Sync.channel = null; }
  stopPolling();
  Sync.isConnected = false;
}

// Listener starten – läuft bis zum echten Verlassen
function startRoomListener() {
  detachListener();
  if (!sb) return;
  Sync.resultShown = false;

  Sync.channel = sb.channel(`room-${S.roomCode}`)
    .on('postgres_changes', {
      event: '*', schema: 'public', table: 'bb_rooms',
      filter: `code=eq.${S.roomCode}`
    }, payload => {
      Sync.isConnected = true;
      Sync.pollingDelay = 2500; // backoff zurücksetzen
      const room = payload.new?.data;
      if (room) handleRoomUpdateSafe(room);
    })
    .subscribe(status => {
      if (status === 'SUBSCRIBED') { Sync.isConnected = true; }
      if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT') {
        Sync.isConnected = false;
        startPolling();
      }
    });

  startPolling(); // immer als Fallback
}

// Idempotenter Room-Update-Handler
function handleRoomUpdateSafe(room) {
  if (!room) return;
  S.room = room;

  // Lobby → Quiz starten
  if (S.screen === 'multi-lobby' && room.status === 'playing') {
    S.multiQIdx = 0; S.multiScore = 0; S.multiAnswered = null;
    go('multi-quiz'); return;
  }

  // Beide fertig → Ergebnis zeigen (idempotent)
  const players = Object.values(room.players || {});
  const bothFinished = players.length >= 2 && players.every(p => p.finished);
  if (bothFinished && !Sync.resultShown) {
    Sync.resultShown = true;
    go('multi-result'); return;
  }

  if (['multi-lobby','multi-quiz','multi-waiting'].includes(S.screen)) render();
}

// Polling als Fallback (mit funktionierendem Backoff)
function startPolling() {
  if (Sync.pollingInterval) return;
  async function poll() {
    if (!S.roomCode || !sb) { Sync.pollingInterval = null; return; }
    const room = await loadRoom(S.roomCode);
    if (room) handleRoomUpdateSafe(room);
    if (!Sync.isConnected) {
      Sync.pollingDelay = Math.min(Sync.pollingDelay + 1000, 8000);
    }
    Sync.pollingInterval = setTimeout(poll, Sync.pollingDelay);
  }
  Sync.pollingInterval = setTimeout(poll, Sync.pollingDelay);
}

function stopPolling() {
  if (Sync.pollingInterval) { clearTimeout(Sync.pollingInterval); Sync.pollingInterval = null; }
}

// Force-Resync nach Standby/Online
async function forceRoomSync() {
  if (!S.roomCode || !sb) return;
  const room = await loadRoom(S.roomCode);
  if (room) handleRoomUpdateSafe(room);
}

// Handy entsperrt → sofort resyncen
document.addEventListener('visibilitychange', () => {
  if (!document.hidden && S.roomCode) forceRoomSync();
});

// WLAN wieder da → sofort resyncen
window.addEventListener('online', () => {
  if (S.roomCode) forceRoomSync();
});

//  🎮  GAME LOGIC
// ══════════════════════════════════════════════════════════
function go(screen) { S.screen = screen; render(); }

function startSolo() {
  const pool = getByTopic(S.topic);
  S.quizQs = shuffle(pool).slice(0,QUESTIONS_PER_ROUND).map(shuffleOptions);
  S.qIdx = 0; S.score = 0; S.answered = null;
  trackEvent('solo_started', S.topic);
  go('solo-quiz');
}

function startLearn() {
  const pool = getByTopic(S.topic);
  S.quizQs = shuffle(pool).map(shuffleOptions); // ALLE Fragen
  S.qIdx = 0; S.score = 0; S.answered = null;
  trackEvent('learn_started', S.topic);
  go('solo-quiz');
}

function handleSoloAnswer(chosen) {
  if (S.answered !== null) return;
  S.answered = chosen;
  if (chosen === S.quizQs[S.qIdx].c) S.score++;
  render();
}

function nextSolo() {
  S.qIdx++; S.answered = null;
  if (S.qIdx >= S.quizQs.length) go('solo-result'); else render();
}

async function createRoom() {
  if (!S.topic || !S.playerName || !sb) return;
  const code = genCode();
  const questions = shuffle(getByTopic(S.topic)).slice(0,10).map(shuffleOptions);
  const room = { code, topic: S.topic, questions, hostId: S.playerId,
    players: { [S.playerId]: { name: S.playerName, score:0, qIdx:0, finished:false } },
    status: 'waiting', createdAt: Date.now() };
  await saveRoom(room);
  S.roomCode = code; S.room = room; S.isHost = true;
  S.multiQIdx = 0; S.multiScore = 0; S.multiAnswered = null;
  trackEvent('duel_created', S.topic);
  startRoomListener();
  go('multi-lobby');
}

async function joinRoom() {
  const inp = document.getElementById('codeInput');
  const code = (inp?.value || '').toUpperCase().trim();
  if (!code || !S.playerName || !sb) return;
  const found = await loadRoom(code);
  if (!found) { alert('Raum nicht gefunden! Bitte Code prüfen.'); return; }
  if (Object.keys(found.players||{}).length >= 2) { alert('Dieser Raum ist bereits voll!'); return; }
  if (found.status !== 'waiting') { alert('Das Spiel hat bereits begonnen!'); return; }
  found.players[S.playerId] = { name: S.playerName, score:0, qIdx:0, finished:false };
  await saveRoom(found);
  S.roomCode = code; S.room = found; S.isHost = false;
  S.multiQIdx = 0; S.multiScore = 0; S.multiAnswered = null;
  trackEvent('duel_joined', found.topic);
  startRoomListener();
  go('multi-lobby');
}

async function startGame() {
  const fresh = await loadRoom(S.roomCode);
  if (!fresh) return;
  if (Object.keys(fresh.players||{}).length < 2) { alert('Warte noch auf den 2. Spieler!'); return; }
  fresh.status = 'playing';
  await saveRoom(fresh);
}

// Hilfsfunktion: Nur eigenen Spieler atomar updaten (gegen Race Conditions)
async function savePlayerData(data) {
  if (!sb || !S.room) return;
  S.room.players[S.playerId] = data;
  // Falls update_player RPC existiert → atomar; sonst Fallback auf saveRoom
  try {
    await sb.rpc('update_player', { room_code: S.roomCode, player_id: S.playerId, player_data: data });
  } catch(e) {
    await saveRoom(S.room);
  }
}

async function handleMultiAnswer(chosen) {
  if (S.multiAnswered !== null) return;
  S.multiAnswered = chosen;
  const q = S.room.questions[S.multiQIdx];
  if (chosen === q.c) S.multiScore++;
  await savePlayerData({ ...(S.room.players[S.playerId]||{}), score: S.multiScore, qIdx: S.multiQIdx });
  render();
}

async function nextMulti() {
  const nextIdx = S.multiQIdx + 1;
  if (nextIdx >= (S.room?.questions?.length || QUESTIONS_PER_ROUND)) {
    await savePlayerData({ ...(S.room.players[S.playerId]||{}), finished:true, score: S.multiScore });
    go('multi-waiting');
  } else {
    S.multiQIdx = nextIdx; S.multiAnswered = null;
    await savePlayerData({ ...(S.room.players[S.playerId]||{}), qIdx: nextIdx });
    render();
  }
}

function setName(nextScreen) {
  const inp = document.getElementById('nameInput');
  if (!inp?.value?.trim()) return;
  S.playerName = inp.value.trim();
  go(nextScreen);
}

function selectTopic(t) {
  if (!isTopicUnlocked(t)) { showLockedMsg(t); return; }
  S.topic = t; render();
}

function showLockedMsg(t) {
  var p = topicProgress[t] || { count: 0 };

}

      <div class="live-vs">VS</div>
      <div class="live-player" style="flex-direction:row-reverse">
        <span class="live-name amber">${oppData?.name||'…'}</span>
        <span class="live-score">${oppData?.score||0}</span>
      </div>
    </div>
    <div class="quiz-topbar">
      <div class="topbar-item">
        <span class="topbar-label">Frage</span>
        <span class="topbar-value">${S.multiQIdx+1} / ${total}</span>
      </div>
      <div class="topbar-item">
        <span class="topbar-label">Thema</span>
        <span class="topbar-value">${S.room.topic}</span>
      </div>
    </div>
    ${progressBar(pct)}
    <div class="question-text">${q.q}</div>
    <div class="answers">${q.o.map((o,i)=>answerBtn(o,i,S.multiAnswered,q.c)).join('')}</div>
    ${S.multiAnswered!==null?`
      <div class="feedback-box${S.multiAnswered===q.c?'':' wrong-fb'}">
        <div class="feedback-title">${S.multiAnswered===q.c?'✓ Richtig!':'✗ Nicht ganz'}</div>
        <p class="feedback-text">${q.e}</p>
        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
          <button class="btn-primary" onclick="nextMulti()">${isLast?'Ergebnis ansehen':'Nächste Frage'}</button>
          ${q.author?`<span style="font-size:0.72rem;color:var(--text-muted);opacity:0.7;text-align:right">✍️ ${q.author}</span>`:''}
        </div>
      </div>`:''}
  `;
}

function renderMultiWaiting() {
  const opp = Object.entries(S.room?.players||{}).find(([id])=>id!==S.playerId);
  const oppData = opp?opp[1]:null;
  return `
    <div style="text-align:center">
      <div style="font-size:3rem;margin-bottom:12px">⏳</div>
      <h2 class="welcome-title">Du bist fertig!</h2>
      <p class="welcome-sub">Warte auf ${oppData?.name||'deinen Gegner'}…</p>
      <div style="margin-top:16px;color:var(--emerald);font-size:0.9rem">
        Dein Score: <strong>${S.multiScore} / ${S.room?.questions?.length||QUESTIONS_PER_ROUND}</strong>
      </div>
    </div>
  `;
}

function renderMultiResult() {
  const total = S.room?.questions?.length||QUESTIONS_PER_ROUND;
  const players = Object.entries(S.room?.players||{});
  const me = players.find(([id])=>id===S.playerId);
  const opp = players.find(([id])=>id!==S.playerId);
  const myScore = me?me[1].score:S.multiScore;
  const oppData = opp?opp[1]:null;
  const oppScore = oppData?.score||0;
  const won = myScore > oppScore, tie = myScore === oppScore;
  return `
    <div style="text-align:center">
      <div style="font-size:3.5rem;margin-bottom:10px">${tie?'🤝':won?'🏆':'😤'}</div>
      <h2 class="welcome-title">${tie?'Unentschieden!':won?'Du hast gewonnen!':'Knapp daneben!'}</h2>
      <div class="score-compare">
        <div class="score-col">
          <div class="score-label">Du (${S.playerName})</div>
          <div class="score-big emerald">${myScore}/${total}</div>
        </div>
        <div class="score-col">
          <div class="score-label">${oppData?.name||'Gegner'}</div>
          <div class="score-big amber">${oppScore}/${total}</div>
        </div>
      </div>
      <div style="height:1px;background:rgba(255,255,255,0.07);margin:20px 0"></div>
      <div class="btn-row" style="justify-content:center;flex-wrap:wrap">
        <button class="btn-primary" onclick="detachListener();S.room=null;S.roomCode='';S.topic=null;go('multi-name-create')">Neues Duell ⚔️</button>
        <button class="btn-secondary" onclick="goHome()">Startmenü</button>
      </div>
    </div>
  `;
}

function renderLearnSetup() {
  return `
    <h2 class="welcome-title">📚 Lernmodus</h2>
    <p class="welcome-sub">Wähle ein Thema – du bekommst alle Fragen in zufälliger Reihenfolge.</p>
    ${topicGrid(S.topic)}
    <div class="btn-row">
      <button class="btn-primary" onclick="startLearn()" ${!S.topic?'disabled':''}>
        Alle ${S.topic ? getByTopic(S.topic).length : ''} Fragen starten 📚
      </button>
      <button class="btn-secondary" onclick="go('home')">Zurück</button>
    </div>
  `;
}

function renderSoloSetup() {
  return `
    <h2 class="welcome-title">Thema wählen</h2>
    <p class="welcome-sub">10 zufällige Fragen aus dem gewählten Thema.</p>
    ${topicGrid(S.topic)}
    <div class="btn-row">
      <button class="btn-primary" onclick="startSolo()" ${!S.topic?'disabled':''}>Quiz starten 🚀</button>
      <button class="btn-secondary" onclick="go('home')">Zurück</button>
    </div>
  `;
}

function renderSoloQuiz() {
  const q = S.quizQs[S.qIdx];
  const total = S.quizQs.length;
  const pct = Math.round((S.qIdx/total)*100);
  const isLast = S.qIdx >= total-1;
  return `
    <div class="quiz-topbar">
      <div class="topbar-item"><span class="topbar-label">Thema</span><span class="topbar-value">${S.topic}</span></div>
      <div class="topbar-item"><span class="topbar-label">Frage</span><span class="topbar-value">${S.qIdx+1} / ${total}</span></div>
      <div class="topbar-item"><span class="topbar-label">Punkte</span><span class="topbar-value" style="color:var(--emerald)">${S.score}</span></div>
    </div>
    ${progressBar(pct)}
    <div class="question-text">${q.q}</div>
    <div class="answers">${q.o.map((o,i)=>answerBtn(o,i,S.answered,q.c)).join('')}</div>
    ${S.answered!==null?`
      <div class="feedback-box${S.answered===q.c?'':' wrong-fb'}">
        <div class="feedback-title">${S.answered===q.c?'✓ Richtig!':'✗ Nicht ganz'}</div>
        <p class="feedback-text">${q.e}</p>
        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
          <button class="btn-primary" onclick="nextSolo()">${isLast?'Ergebnis ansehen':'Nächste Frage'}</button>
          ${q.author?`<span style="font-size:0.72rem;color:var(--text-muted);opacity:0.7;text-align:right">✍️ ${q.author}</span>`:''}
        </div>
      </div>`:''}
  `;
}

function renderSoloResult() {
  const total = S.quizQs.length, pct = Math.round(S.score/total*100);
  const msg = pct<50?'Ein guter Anfang – eine weitere Runde festigt das Thema.'
    :pct<70?'Schon solide! Du hast viele Inhalte sicher erfasst.'
    :pct<90?'Sehr stark. Du kennst dieses Thema wirklich gut.'
    :pct<100?'Ausgezeichnet – nur noch eine Frage vom Perfektscore!'
    :'Perfekt. Alle Fragen richtig – beeindruckend!';
  return `
    <div style="text-align:center">
      <div class="result-score">${S.score}<span class="result-total">/${total}</span></div>
      <div class="result-pct">${pct}% richtig &middot; ${S.topic}</div>
      <p class="result-msg">${msg}</p>
      <div style="height:1px;background:rgba(255,255,255,0.07);margin:20px 0"></div>
      <div class="btn-row" style="justify-content:center;flex-wrap:wrap">
        <button class="btn-primary" onclick="startSolo()">Nochmal spielen</button>
        <button class="btn-secondary" onclick="go('solo-setup')">Thema wechseln</button>
        <button class="btn-secondary" onclick="go('home')">Startmenü</button>
      </div>
    </div>
  `;
}

// ══════════════════════════════════════════════════════════
//  📊  ADMIN DASHBOARD
// ══════════════════════════════════════════════════════════
var statsData = null;
var statsLoading = false;

async function loadStats() {
  if (!sb || !isAdmin || statsLoading) return;
  statsLoading = true;
  render();
  try {
    var res = await sb.rpc('get_stats', { admin_code: _adminInput });
    statsData = res.data || [];
  } catch(e) { statsData = []; }
  statsLoading = false;
  render();
}

window.showDashboard = function() { loadStats(); go('admin-dashboard'); };

function renderDashboard() {
  if (!isAdmin) return renderHome();
  if (statsLoading) return '<div class="dash-loading">📊 Lade Statistiken…</div>';
  if (!statsData || statsData.length === 0) {
    return '<h2 class="welcome-title">📊 Dashboard</h2>' +
      '<p class="welcome-sub">Noch keine Nutzungsdaten vorhanden. Statistiken erscheinen, sobald das Quiz genutzt wird.</p>' +
      '<div class="btn-row"><button class="btn-secondary" onclick="go(\'home\')">← Zurück</button></div>';
  }

  var totals = { solo_started: 0, learn_started: 0, duel_created: 0, duel_joined: 0 };
  var topicCounts = {};
  var dayCounts = {};

  statsData.forEach(function(r) {
    if (totals[r.event_type] !== undefined) totals[r.event_type] += r.count;
    if (r.topic && ['solo_started','learn_started','duel_created'].indexOf(r.event_type) >= 0) {
      topicCounts[r.topic] = (topicCounts[r.topic] || 0) + r.count;
    }
    dayCounts[r.day] = (dayCounts[r.day] || 0) + r.count;
  });

  var totalAll = totals.solo_started + totals.learn_started + totals.duel_created;
  var uniqueDays = Object.keys(dayCounts).length;
  var topTopics = Object.entries(topicCounts).sort(function(a,b) { return b[1] - a[1]; });
  var maxTopicCount = topTopics.length > 0 ? topTopics[0][1] : 1;
  var recentDays = Object.entries(dayCounts).sort(function(a,b) { return b[0].localeCompare(a[0]); }).slice(0, 14);
  var maxDayCount = recentDays.length > 0 ? Math.max.apply(null, recentDays.map(function(d) { return d[1]; })) : 1;

  var h = '<h2 class="welcome-title">📊 Nutzungsstatistik</h2>' +
    '<p class="welcome-sub">Anonyme, aggregierte Daten – kein Personenbezug.</p>' +
    '<div class="dash-grid">' +
      '<div class="dash-card"><div class="dash-number">' + totalAll + '</div><div class="dash-label">Spiele gesamt</div></div>' +
      '<div class="dash-card"><div class="dash-number">' + totals.solo_started + '</div><div class="dash-label">Solo-Quizze</div></div>' +
      '<div class="dash-card"><div class="dash-number">' + totals.learn_started + '</div><div class="dash-label">Lernmodus</div></div>' +
      '<div class="dash-card"><div class="dash-number">' + totals.duel_created + '</div><div class="dash-label">Duelle</div></div>' +
      '<div class="dash-card"><div class="dash-number">' + uniqueDays + '</div><div class="dash-label">Aktive Tage</div></div>' +
    '</div>';

  h += '<div style="margin-bottom:20px">' +
    '<div class="admin-title" style="margin-bottom:10px">🏆 Beliebteste Themen</div>' +
    '<table class="dash-table"><tr><th>Thema</th><th>Spiele</th><th></th></tr>';
  topTopics.forEach(function(entry) {
    var w = Math.round(entry[1] / maxTopicCount * 120);
    h += '<tr><td>' + entry[0] + '</td><td>' + entry[1] + '</td>' +
      '<td><span class="dash-bar" style="width:' + w + 'px"></span></td></tr>';
  });
  h += '</table></div>';

  h += '<div style="margin-bottom:20px">' +
    '<div class="admin-title" style="margin-bottom:10px">📅 Letzte 14 Tage</div>' +
    '<table class="dash-table"><tr><th>Datum</th><th>Events</th><th></th></tr>';
  recentDays.forEach(function(entry) {
    var label = new Date(entry[0] + 'T00:00:00').toLocaleDateString('de-DE', { weekday:'short', day:'numeric', month:'short' });
    var w = Math.round(entry[1] / maxDayCount * 120);
    h += '<tr><td>' + label + '</td><td>' + entry[1] + '</td>' +
      '<td><span class="dash-bar" style="width:' + w + 'px"></span></td></tr>';
  });
  h += '</table></div>';

  h += '<div class="btn-row">' +
    '<button class="btn-primary" onclick="loadStats()">🔄 Aktualisieren</button>' +
    '<button class="btn-secondary" onclick="go(\'home\')">← Zurück</button></div>';

  return h;
}

// ══════════════════════════════════════════════════════════
//  🌐  GLOBAL ONCLICK HANDLERS
// ══════════════════════════════════════════════════════════
window.go = go;
window.selectTopic = selectTopic;
window.answerClick = i => { if (S.screen==='solo-quiz') handleSoloAnswer(i); else if (S.screen==='multi-quiz') handleMultiAnswer(i); };
window.nextSolo = nextSolo;
window.nextMulti = nextMulti;
window.startSolo = startSolo;
window.startLearn = startLearn;
window.createRoom = createRoom;
window.joinRoom = joinRoom;
window.startGame = startGame;
window.setName = setName;
window.showFbError = showFbError;
window.showLockedMsg = showLockedMsg;
window.leaveRoom = leaveRoom;
window.goHome = goHome;
window.S = S;

// ══════════════════════════════════════════════════════════
//  🖥️  MAIN RENDER
// ══════════════════════════════════════════════════════════
function render() {
  const content = document.getElementById('content');
  const subtitle = document.getElementById('subtitle');
  const screens = {
    'home': renderHome,
    'solo-setup': renderSoloSetup,
    'learn-setup': renderLearnSetup,
    'solo-quiz': renderSoloQuiz,
    'solo-result': renderSoloResult,
    'multi-name-create': () => renderNameScreen('multi-create','Weiter →'),
    'multi-create': renderCreateSetup,
    'multi-name-join': () => renderNameScreen('multi-join','Weiter →'),
    'multi-join': renderJoinScreen,
    'multi-lobby': renderLobby,
    'multi-quiz': renderMultiQuiz,
    'multi-waiting': renderMultiWaiting,
    'multi-result': renderMultiResult,
    'admin-dashboard': renderDashboard,
  };
  if (content) content.innerHTML = (screens[S.screen]||renderHome)();
  if (subtitle) subtitle.textContent = S.screen.startsWith('multi')
    ? 'Multiplayer · Duell-Modus ⚔️'
    : 'Biochemie für Studierende der Humanmedizin, Zahnmedizin und Neurowissenschaften';
}

loadTopicProgress().then(function() { render(); });
</script>
